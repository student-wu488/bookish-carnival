<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>净网守护 - 抖音评论过滤</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
    }
    
    .header {
      padding: 20px;
      background: rgba(0, 212, 255, 0.1);
      border-bottom: 1px solid rgba(0, 212, 255, 0.2);
      text-align: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #00D4FF;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      color: #6B8CAE;
    }
    
    .status-section {
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    
    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4CAF50;
      animation: pulse 2s infinite;
    }
    
    .status-indicator.offline {
      background: #f44336;
      animation: none;
    }
    
    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
    
    .status-text {
      font-size: 13px;
      color: #94a3b8;
      flex: 1;
    }
    
    .stats-section {
      padding: 16px 20px;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .stat-value.total {
      color: #00D4FF;
    }
    
    .stat-value.blocked {
      color: #FF4D6D;
    }
    
    .stat-value.approved {
      color: #4CAF50;
    }
    
    .stat-value.pending {
      color: #ff9800;
    }
    
    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .actions {
      padding: 16px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      background: rgba(0, 212, 255, 0.2);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 6px;
      color: #00D4FF;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn:hover {
      background: rgba(0, 212, 255, 0.3);
      border-color: rgba(0, 212, 255, 0.5);
    }
    
    .btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛡️ 净网守护</h1>
    <p>AI 驱动的抖音评论过滤</p>
  </div>
  
  <div class="status-section">
    <div class="status-item">
      <div class="status-indicator" id="statusIndicator"></div>
      <div class="status-text" id="statusText">后端服务在线</div>
    </div>
  </div>
  
  <div class="stats-section">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value total" id="totalCount">0</div>
        <div class="stat-label">总评论</div>
      </div>
      <div class="stat-card">
        <div class="stat-value blocked" id="blockedCount">0</div>
        <div class="stat-label">已过滤</div>
      </div>
      <div class="stat-card">
        <div class="stat-value approved" id="approvedCount">0</div>
        <div class="stat-label">已通过</div>
      </div>
      <div class="stat-card">
        <div class="stat-value pending" id="pendingCount">0</div>
        <div class="stat-label">待审核</div>
      </div>
    </div>
    
    <div class="actions">
      <button class="btn" id="resetBtn">🔄 重置统计数据</button>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
